<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Memory Game</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
<button class="settings-btn" onclick="openSettings()">⚙️</button>
<audio id="bgMusic" loop>
    <source src="Audio/BackgorundMusic.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <audio id="winSound">
  <source src="Audio/Winningsound.mp3" type="audio/mpeg">
</audio>
<audio id="loseSound">
  <source src="Audio/loseSound.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound">
  <source src="Audio/Winningsound.mp3" type="audio/mpeg">
</audio>
<main class="game-page">
    <nav class="game-navbar">
        <h1>MEMORY CARD GAME</h1>
        <div class="nav-wave"></div>  
    </nav>
    
<div class="game-container">
  <div class="game-info">
    <span>Moves: <span id="moves">0</span></span>
    <span>Time: <span id="time">00:00</span></span>
  </div>

        <div id="gameGrid" class="game-grid"></div>

    <button class="cancel-icon-btn" onclick="goHome()" title="Cancel Game">
        Cancel
    </button>

</div>
</main>

<!-- setting modal -->
<div id="settingsModal" class="modal">
  <div class="settings-pro">

    <span class="close-btn" onclick="closeSettings()">×</span>

    <h2>⚙️ Settings</h2>
    <p class="subtitle">Customize your game experience</p>

    <!-- SOUND -->
    <div class="setting-row">
      <div class="setting-info">
        <span class="icon">🎵</span>
        <div>
          <h4>Music</h4>
          <p>Background sound</p>
        </div>
      </div>

      <label class="switch">
        <input type="checkbox" onclick="toggleMusic()">
        <span class="slider"></span>
      </label>
    </div>


    <!-- NAV -->
    <div class="setting-row">
      <div class="setting-info">
        <span class="icon">🏠</span>
        <div>
          <h4>Navigation</h4>
          <p>Go back home</p>
        </div>
      </div>

      <button class="nav-action" onclick="goToHome()">Home</button>
    </div>

  </div>
</div>

<!-- game complete modal -->
<div id="resultModal" class="modal">
  <div class="modal-content">
    <h2>🎉 Game Completed!</h2>
    <p>Moves: <span id="finalMoves"></span></p>
    <p>Time: <span id="finalTime"></span></p>

    <div class="modal-buttons">
        <button onclick="playClick(); restartGame()">Restart</button>
        <button onclick="playClick(); goHome()">Home</button>
    </div>
  </div>
</div>

<!-- Game Over Modal -->
<div id="gameOverModal" class="modal">
  <div class="modal-content">
    <h2>⏰ Game Over</h2>
    <p>Time has run out !</p>
    <p>Moves : <span id="gameOverMoves"></span></p>
    <div class="modal-buttons">
        <button onclick="playClick(); restartGame()">Restart</button>
        <button onclick="playClick(); goHome()">Home</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
